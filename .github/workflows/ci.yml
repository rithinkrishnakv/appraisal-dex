name: Appraisal DEX CI

on:
  push:
    branches: [ main, dev ]
  pull_request:
    branches: [ main ]

jobs:
  test:
    name: Tests & Lint
    runs-on: ubuntu-latest
    strategy:
      matrix:
        python-version: ["3.10", "3.11", "3.12"]

    steps:
      - name: Checkout
        uses: actions/checkout@v4

      - name: Set up Python ${{ matrix.python-version }}
        uses: actions/setup-python@v5
        with:
          python-version: ${{ matrix.python-version }}

      - name: Install Java (required by androguard)
        uses: actions/setup-java@v4
        with:
          distribution: temurin
          java-version: 17

      - name: Cache pip
        uses: actions/cache@v4
        with:
          path: ~/.cache/pip
          key: ${{ runner.os }}-pip-${{ hashFiles('requirements.txt') }}
          restore-keys: ${{ runner.os }}-pip-

      - name: Install dependencies
        run: |
          python -m pip install --upgrade pip
          pip install -r requirements.txt
          pip install pytest pytest-cov ruff

      - name: Install package
        run: pip install -e .

      - name: Lint with ruff
        run: ruff check appraisal/ --select E,F,W --ignore E501 || true

      - name: Run tests
        run: |
          python -m pytest tests/ -v --tb=short --cov=appraisal --cov-report=term-missing

      - name: Verify CLI entry point
        run: |
          appraisal-dex --version
          appraisal-dex list-modules

      - name: Generate test APK and run smoke scan
        run: |
          python scripts/create_test_apk.py tests/samples/ci_test.apk
          appraisal-dex scan tests/samples/ci_test.apk --json -o /tmp/ci_report || true
          test -f /tmp/ci_report/report.json && echo "Report generated successfully"

  release:
    name: Create Release Asset
    runs-on: ubuntu-latest
    needs: test
    if: github.ref == 'refs/heads/main' && github.event_name == 'push'

    steps:
      - name: Checkout
        uses: actions/checkout@v4

      - name: Set up Python
        uses: actions/setup-python@v5
        with:
          python-version: "3.11"

      - name: Install build tools
        run: pip install build

      - name: Build distribution
        run: python -m build --wheel --sdist

      - name: Upload build artifacts
        uses: actions/upload-artifact@v4
        with:
          name: appraisal-dex-dist
          path: dist/
          retention-days: 30
