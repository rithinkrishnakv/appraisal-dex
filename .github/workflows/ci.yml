name: Appraisal DEX CI

on:
  push:
    branches: [ main, dev ]
  pull_request:
    branches: [ main ]

jobs:
  test:
    name: Tests — Python ${{ matrix.python-version }}
    runs-on: ubuntu-latest
    strategy:
      fail-fast: false
      matrix:
        python-version: ["3.10", "3.11", "3.12"]

    steps:
      - name: Checkout
        uses: actions/checkout@v4

      - name: Set up Python ${{ matrix.python-version }}
        uses: actions/setup-python@v5
        with:
          python-version: ${{ matrix.python-version }}

      - name: Set up Java 17 (required by androguard)
        uses: actions/setup-java@v4
        with:
          distribution: temurin
          java-version: 17

      - name: Cache pip
        uses: actions/cache@v4
        with:
          path: ~/.cache/pip
          key: ${{ runner.os }}-pip-${{ matrix.python-version }}-${{ hashFiles('requirements.txt') }}
          restore-keys: |
            ${{ runner.os }}-pip-${{ matrix.python-version }}-
            ${{ runner.os }}-pip-

      - name: Install dependencies
        run: |
          python -m pip install --upgrade pip
          pip install -r requirements.txt
          pip install pytest pytest-cov ruff

      - name: Install Appraisal DEX
        run: pip install -e .

      - name: Lint (non-blocking)
        run: ruff check appraisal/ --select E,F,W --ignore E501 || true

      - name: Run unit tests
        run: python -m pytest tests/ -v --tb=short

      - name: Verify CLI entry point
        run: |
          appraisal-dex --version
          appraisal-dex list-modules

      - name: Build test APK
        run: python scripts/create_test_apk.py tests/samples/ci_test.apk

      - name: Smoke scan — verify zero log noise
        run: |
          # Must complete without any DEBUG/INFO lines on stdout/stderr
          appraisal-dex scan tests/samples/ci_test.apk \
            --json --min-rank D \
            -o /tmp/ci_report \
            --no-banner 2>&1 | tee /tmp/scan_output.txt

          # Fail CI if any DEBUG lines leaked through
          if grep -E '^\d{4}-\d{2}-\d{2}.*\| DEBUG' /tmp/scan_output.txt; then
            echo "FAIL: Debug log lines leaked to stdout"
            exit 1
          fi
          echo "PASS: Zero debug log noise"

      - name: Verify report was generated
        run: |
          test -f /tmp/ci_report/report.json && echo "JSON report OK"
          python -c "
          import json
          with open('/tmp/ci_report/report.json') as f:
              r = json.load(f)
          findings = len(r['findings'])
          print(f'Findings: {findings}')
          assert findings >= 1, 'Expected at least 1 finding from vuln test APK'
          print('Report validation: PASS')
          "

      - name: Upload report artifact
        uses: actions/upload-artifact@v4
        if: always()
        with:
          name: appraisal-report-py${{ matrix.python-version }}
          path: /tmp/ci_report/
          retention-days: 7

  release:
    name: Build distribution
    runs-on: ubuntu-latest
    needs: test
    if: github.ref == 'refs/heads/main' && github.event_name == 'push'

    steps:
      - uses: actions/checkout@v4

      - uses: actions/setup-python@v5
        with:
          python-version: "3.11"

      - name: Install build
        run: pip install build

      - name: Build wheel and sdist
        run: python -m build --wheel --sdist

      - name: Upload build artifacts
        uses: actions/upload-artifact@v4
        with:
          name: appraisal-dex-dist
          path: dist/
          retention-days: 30
