<svg width="900" height="110" viewBox="0 0 900 110" xmlns="http://www.w3.org/2000/svg">
<style>
  @keyframes glow   { 0%,100% { opacity:1 } 50% { opacity:.35 } }
  @keyframes sweep2 { 0% { transform: translateX(0); } 100% { transform: translateX(800px); } }
  .glowPulse { animation: glow 1.4s ease-in-out infinite; }
  #chase     { animation: sweep2 4.5s linear infinite; }
</style>

<defs>
  <linearGradient id="rankGrad" x1="0%" y1="0%" x2="100%" y2="0%">
    <stop offset="0%"   stop-color="#3f5750"/>
    <stop offset="14%"  stop-color="#1f8f68"/>
    <stop offset="28%"  stop-color="#2bdca0"/>
    <stop offset="42%"  stop-color="#c9d14a"/>
    <stop offset="57%"  stop-color="#ff9f5a"/>
    <stop offset="71%"  stop-color="#ff6b5e"/>
    <stop offset="85%"  stop-color="#ff3b3b"/>
    <stop offset="100%" stop-color="#ff1f3d"/>
  </linearGradient>
  <linearGradient id="chaseGrad" x1="0%" y1="0%" x2="100%" y2="0%">
    <stop offset="0%"   stop-color="#ffffff" stop-opacity="0"/>
    <stop offset="50%"  stop-color="#ffffff" stop-opacity="0.55"/>
    <stop offset="100%" stop-color="#ffffff" stop-opacity="0"/>
  </linearGradient>
  <clipPath id="barClip">
    <rect x="20" y="44" width="860" height="14" rx="7"/>
  </clipPath>
</defs>

<rect x="0" y="0" width="900" height="110" rx="8" fill="#070b10"/>
<rect x="0.5" y="0.5" width="899" height="109" rx="8" fill="none" stroke="#1c2b27"/>

<!-- the rank bar itself -->
<rect x="20" y="44" width="860" height="14" rx="7" fill="url(#rankGrad)" opacity="0.85"/>
<g clip-path="url(#barClip)">
  <rect id="chase" x="-100" y="44" width="100" height="14" fill="url(#chaseGrad)"/>
</g>
<rect x="20.5" y="44.5" width="859" height="13" rx="7" fill="none" stroke="#0c1410" stroke-width="1"/>

<!-- tick marks + labels for each rank -->
<g font-family="monospace" font-size="12" font-weight="bold" text-anchor="middle">
  <text x="55"  y="34" fill="#5b6b66">F</text>
  <text x="160" y="34" fill="#2f9e6e">D</text>
  <text x="265" y="34" fill="#2bdca0">C</text>
  <text x="370" y="34" fill="#c9d14a">B</text>
  <text x="475" y="34" fill="#ff9f5a">A</text>
  <text x="580" y="34" fill="#ff6b5e">S</text>
  <text x="685" y="34" fill="#ff3b3b">SS</text>
  <text x="800" y="34" fill="#ff1f3d" class="glowPulse">SSS</text>
</g>

<g font-family="monospace" font-size="9" text-anchor="middle" fill="#4d655e">
  <text x="55"  y="80">NOISE</text>
  <text x="160" y="80">DEBT</text>
  <text x="265" y="80">LOW</text>
  <text x="370" y="80">MEDIUM</text>
  <text x="475" y="80">HIGH</text>
  <text x="580" y="80">CRITICAL</text>
  <text x="685" y="80">CHAIN</text>
  <text x="800" y="80" fill="#ff1f3d">SUPPLY CHAIN</text>
</g>

<text x="20" y="100" font-family="monospace" font-size="9" fill="#3f5750" letter-spacing="1">CVSS 0.0</text>
<text x="880" y="100" font-family="monospace" font-size="9" fill="#3f5750" text-anchor="end" letter-spacing="1">CVSS 10.0</text>
</svg>
